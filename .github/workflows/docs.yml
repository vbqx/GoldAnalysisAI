name: Docs

on:
  push:
    paths:
      - 'docs/**'
      - 'scripts/export_sample_report.py'
      - 'src/core/types.py'
      - 'src/core/orchestrator.py'
      - 'src/data/fetch_pipeline.py'
      - 'tests/regression/test_doc_pipeline_sync.py'
      - 'tests/regression/test_docs_structure.py'
      - 'tests/regression/test_export_sample_report.py'
      - 'tests/regression/test_aspice_assets.py'
      - 'scripts/check_aspice_assets.py'
      - 'scripts/generate_aspice_software_evidence.py'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/export_sample_report.py'
      - 'src/core/types.py'
      - 'src/core/orchestrator.py'
      - 'src/data/fetch_pipeline.py'
      - 'tests/regression/test_doc_pipeline_sync.py'
      - 'tests/regression/test_docs_structure.py'
      - 'tests/regression/test_export_sample_report.py'
      - 'tests/regression/test_aspice_assets.py'
      - 'scripts/check_aspice_assets.py'
      - 'scripts/generate_aspice_software_evidence.py'
      - '.github/workflows/docs.yml'

jobs:
  doc-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Verify docs sync, structure, and sample report export
        run: >-
          pytest
          tests/regression/test_doc_pipeline_sync.py
          tests/regression/test_docs_structure.py
          tests/regression/test_export_sample_report.py
          tests/regression/test_aspice_assets.py
          -v
