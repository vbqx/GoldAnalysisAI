# GoldAnalysisAI 测试用例目录

# 维护说明：新增/变更测试时同步更新此文件、test-plan.md 与 tests/ 实现。

# 设计文档：tests/cases/test-plan.md

# 运行：python tests/run.py [--fast|--full]



meta:

  project: GoldAnalysisAI

  last_review: "2026-06-14"

  owner: qa

  layers:

    - id: ui_layout

      prefix: UIL

      doc_section: "2"

    - id: indicators

      prefix: IND

      doc_section: "3"

    - id: functional

      prefix: FN

      doc_section: "4"

    - id: performance

      prefix: PERF

      doc_section: "5"

    - id: financial

      prefix: FIN

      doc_section: "8"

      doc: tests/cases/financial-review-cases.md



suites:

  unit:

    description: 快速单元测试，无网络，< 5s

    path: tests/unit/

  regression:

    description: 回归检查（源码约定、导入、Issue 修复项）

    path: tests/regression/

  integration:

    description: 完整流水线，需 TradingView + 可选 LLM（slow）

    path: tests/integration/

  manual:

    description: 手工 / 浏览器 UI 测试

    path: null



