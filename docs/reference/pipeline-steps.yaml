# 流水线进度步骤权威列表 — 文档与 CI 同步的唯一数据源
# prog.start() 的 key 须与 orchestrator.py、fetch_pipeline.py 一致
# 新增阶段时请同步更新相关 Markdown 文档

version: 1
sources:
  - src/core/orchestrator.py
  - src/data/fetch_pipeline.py

steps:
  - id: fetch
    label: 数据拉取
    module: src/data/fetch_pipeline.py
    function: fetch_all_data
    uses_llm: false
    progress: true

  - id: indicators
    label: 计算技术指标
    module: src/indicators/technical.py
    function: enrich
    uses_llm: false
    progress: true

  - id: ict
    label: ICT 结构分析
    module: src/analysis/ict_pa.py
    function: analyze_timeframe
    uses_llm: false
    progress: true

  - id: analyst_team
    label: 分析师团队
    module: src/agents/analysts/
    function: run_analyst_team
    uses_llm: optional
    progress: true

  - id: bullish
    label: 看多研究
    module: src/agents/factory.py
    function: run_bullish
    uses_llm: optional
    progress: true

  - id: bearish
    label: 看空研究
    module: src/agents/factory.py
    function: run_bearish
    uses_llm: optional
    progress: true

  - id: debate
    label: 多空辩论
    module: src/agents/factory.py
    function: run_debate
    uses_llm: optional
    progress: true

  - id: trader
    label: 交易员提案
    module: src/agents/factory.py
    function: run_trader
    uses_llm: optional
    progress: true

  - id: risk
    label: 风控审核
    module: src/agents/factory.py
    function: run_risk
    uses_llm: optional
    progress: true

  - id: manager
    label: 经理决策
    module: src/agents/factory.py
    function: run_manager
    uses_llm: optional
    progress: true

  - id: report
    label: 组装报告
    module: src/analysis/report_engine.py
    function: build_report
    uses_llm: false
    progress: true

  - id: llm_narrative
    label: LLM 报告文案
    module: src/llm/analyst.py
    function: run_llm_analysis
    uses_llm: optional
    progress: true
