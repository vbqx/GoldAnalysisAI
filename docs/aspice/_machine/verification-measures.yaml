schema_version: 1
baseline_id: ASPICE-VER-2026-07-17
status: agreed
owner_role: verification-lead
selection_policy:
  release_scope: 所有修改过的源码、文档、配置和测试，以及其追溯闭包。
  regression_rule: unit、regression、docs、trace 和 static 为离线必选；integration 按受影响接口选择；live external 独立运行。
  entry_criteria: 依赖可用、工作区范围明确、追溯数据通过 schema 校验。
  exit_criteria: 必选措施通过；失败已有 SUP.9 Issue；结果绑定 Git SHA、环境和用例版本。
measures:
  - id: VM-UNIT
    level: SWE.4
    technique: automated unit testing
    command: python tests/run.py --unit
    pass_fail: pytest exit code 0
    environment: CPython 3.12, no network
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-REGRESSION
    level: SWE.6
    technique: automated regression testing
    command: python tests/run.py --regression
    pass_fail: pytest exit code 0
    environment: CPython 3.12, no network
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-INTEGRATION-PIPELINE
    level: SWE.5
    technique: deterministic cross-component report trust-chain integration
    command: python -m pytest tests/integration/test_offline_report_contract.py -m integration
    pass_fail: pytest exit code 0 within declared timeout
    environment: frozen fixtures; no network, paid LLM, or MT5
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-INTEGRATION-EXTERNAL
    level: SWE.5
    technique: live supplier health smoke
    command: python tests/run.py --external
    pass_fail: result classified as pass, supplier unavailable, or software failure; only software failure blocks release
    environment: network required; not part of deterministic offline gate
    result_record: runtime ledger or dedicated live-smoke record
  - id: VM-BACKTEST
    level: SWE.5
    technique: point-in-time simulation with frozen fixtures
    command: python -m pytest tests/unit/test_backtest_*.py
    pass_fail: pytest exit code 0 and no future-data assertion violation
    environment: no network
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-DOCS
    level: SWE.6
    technique: document structure, link and sample synchronization tests
    command: python -m pytest tests/regression/test_doc_pipeline_sync.py tests/regression/test_docs_structure.py tests/regression/test_export_sample_report.py
    pass_fail: pytest exit code 0
    environment: no network
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-TRACE
    level: SWE.1-SWE.6
    technique: bidirectional traceability and document register validation
    command: python scripts/check_aspice_assets.py --check and python scripts/generate_aspice_software_evidence.py --check
    pass_fail: exit code 0, no orphan or dangling identifier
    environment: no network; PyYAML available
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-STATIC
    level: SWE.4
    technique: compile and patch hygiene
    command: python -m compileall -q src app.py run_app.py scripts && git diff --check
    pass_fail: both commands exit code 0
    environment: no network
    result_record: docs/aspice/records/verification/latest.md
  - id: VM-MANUAL-UI
    level: SWE.6
    technique: Streamlit visual and interaction acceptance
    command: python run_app.py
    pass_fail: applicable UI catalog cases pass with screenshots/notes
    environment: supported browser at desktop and mobile widths
    result_record: docs/aspice/records/reviews/gui/streamlit-acceptance-2026-07-08.md
  - id: VM-CONFIG
    level: SUP.8
    technique: configuration item, lock and SBOM consistency
    command: python scripts/check_aspice_assets.py --check
    pass_fail: all controlled paths exist and dependency lock equals SBOM component versions
    environment: no network
    result_record: docs/aspice/records/verification/latest.md
