  - id: CI-FUNCTION-DESIGN
    path: docs/aspice/_machine/software-function-detailed-design.csv
    process: SWE.3
  - id: CI-UNIT-VERIFICATION
    path: docs/aspice/SWE.4-unit-testing.md
    process: SWE.4
  - id: CI-REQUIREMENT-VERIFICATION
    path: docs/aspice/SWE.6-validation-testing.md
    process: SWE.6
  - id: CI-INTEGRATION-PLAN
    path: docs/aspice/SWE.5-integration-testing.md
    process: SWE.5
  - id: CI-VERIFICATION
    path: docs/aspice/SWE.6-validation-testing.md
    process: SWE.4-SWE.6
  - id: CI-TRACE
    path: docs/aspice/traceability.md
    process: SWE.1-SWE.6
