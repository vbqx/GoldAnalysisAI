dependency_baseline:
  resolution_source: docs/aspice/_machine/pip-resolution.json
  lock: docs/aspice/_machine/dependency-lock.txt
  sbom: docs/aspice/_machine/sbom.json
  policy: Exact resolved versions and artifact hashes are generated from pip dry-run report; root requirements remain human-maintained compatibility ranges.
  platform: CPython 3.12, Windows x86_64 resolution; Linux CI must use the same versions and platform-appropriate wheels.
retention:
  baselines: permanent
  verification_results: retain at least through the next superseding baseline
  audit_reports: permanent
  generated_indexes: regenerate and compare in CI
