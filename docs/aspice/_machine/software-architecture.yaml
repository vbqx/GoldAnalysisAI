schema_version: 1
baseline_id: ASPICE-SAD-2026-07-17
status: agreed
owner_role: software-architect
analysis_criteria:
  - requirements_coverage
  - interface_completeness
  - deterministic_testability
  - failure_isolation
  - data_freshness
  - auditability
  - configuration_reproducibility
modes:
  - id: MODE-RULE
    behavior: 规则 Agent 和确定性门禁，不调用 LLM。
  - id: MODE-LLM
    behavior: 配置的 LLM 阶段提供结构化结果，失败显式记录。
  - id: MODE-HYBRID
    behavior: 规则 baseline 先运行，合格 LLM 结果才可覆盖。
  - id: MODE-REPLAY
    behavior: 加载兼容归档，不执行 fetch 或新的 LLM 调用。
components:
  - id: ARC-APP
    name: 应用入口与运行配置
    source_globs: [app.py, run_app.py, views/**]
    static_interfaces: [run_app.py CLI, Streamlit session, RunConfig]
    dynamic_behavior: 解析配置，启动 Streamlit，页面复用会话报告。
    requirements: [SWR-CORE-002, SWR-UI-001, SWR-CFG-001]
  - id: ARC-CORE
    name: 主编排与进度
    source_globs: [src/core/**, src/pipeline.py]
    static_interfaces: [run_trade_agent_pipeline, ProgressReporter, core dataclasses]
    dynamic_behavior: 按配置驱动 fetch、analysis、agents、report、archive，并发布阶段状态。
    requirements: [SWR-CORE-001, SWR-CORE-002, SWR-LLM-001, SWR-REP-001, SWR-REP-003, SWR-CFG-001, SWR-NFR-001, SWR-NFR-002]
  - id: ARC-DATA
    name: 行情与外部数据
    source_globs: [src/data/**]
    static_interfaces: [DataFetchResult, MarketContext, DataSource, archive payload]
    dynamic_behavior: 拉取、标准化、合并、标记来源与失败，并计算 as-of。
    requirements: [SWR-CORE-001, SWR-DATA-001, SWR-DATA-002, SWR-DATA-003, SWR-CFG-001, SWR-NFR-001]
  - id: ARC-INDICATORS
    name: 指标计算
    source_globs: [src/indicators/**]
    static_interfaces: [enriched OHLCV, indicator snapshot]
    dynamic_behavior: 从冻结 OHLCV 计算技术指标并报告输入质量。
    requirements: [SWR-ANA-001]
  - id: ARC-ANALYSIS
    name: 事实、结构、信号与报告门禁
    source_globs: [src/analysis/**]
    static_interfaces: [TimeframeAnalysis, TradingSignal, FactRegistry, invariant result]
    dynamic_behavior: 计算 point-in-time 事实、计划、授权门禁、叙事和可靠度。
    requirements: [SWR-CORE-001, SWR-DATA-002, SWR-DATA-003, SWR-ANA-001, SWR-ANA-002, SWR-ANA-003, SWR-AGT-001, SWR-LLM-003, SWR-REP-001, SWR-REP-002, SWR-REP-003, SWR-REP-004, SWR-BT-001, SWR-UI-002]
  - id: ARC-AGENTS
    name: 规则/LLM Agent 编排
    source_globs: [src/agents/**]
    static_interfaces: [AnalystTeam, AgentEvidence, TransactionProposal, RiskReview, ManagerDecision]
    dynamic_behavior: 运行 Analyst、Research、Debate、Levels、Trader、Risk、Manager 并保留来源。
    requirements: [SWR-CORE-001, SWR-ANA-002, SWR-ANA-003, SWR-AGT-001, SWR-LLM-001, SWR-LLM-002, SWR-LLM-003]
  - id: ARC-LLM
    name: LLM 传输、上下文和策略
    source_globs: [src/llm/**]
    static_interfaces: [LLMClient, stage payload, JSON schema parser]
    dynamic_behavior: 路由模型、构造上下文、传输/重试、解析并记录 I/O。
    requirements: [SWR-LLM-001, SWR-LLM-002, SWR-LLM-003, SWR-CFG-001, SWR-NFR-001]
  - id: ARC-RUN
    name: 运行上下文与归档
    source_globs: [src/run/**]
    static_interfaces: [RunContext, manifest, archive schema/index]
    dynamic_behavior: 建立运行 ID，原子保存成功/失败归档，验证兼容并加载回放。
    requirements: [SWR-CORE-001, SWR-CORE-002, SWR-DATA-003, SWR-REP-001, SWR-REP-002, SWR-REP-003, SWR-ARC-001, SWR-ARC-002, SWR-NFR-002, SWR-NFR-004]
  - id: ARC-BACKTEST
    name: Point-in-time 回测
    source_globs: [src/backtest/**]
    static_interfaces: [BacktestConfig, BacktestResult, TradeResult]
    dynamic_behavior: 截取历史数据、生成规则信号、应用宏观状态、模拟成交并汇总指标。
    requirements: [SWR-BT-001]
  - id: ARC-VIZ
    name: Streamlit 展示
    source_globs: [src/viz/**]
    static_interfaces: [report dict, chart HTML, Streamlit widgets/session]
    dynamic_behavior: 展示报告、图表、外部数据、决策链、拒绝原因、回放和配置。
    requirements: [SWR-REP-004, SWR-ARC-002, SWR-UI-001, SWR-UI-002, SWR-NFR-002]
  - id: ARC-TOOLS
    name: 开发、审核与运维工具
    source_globs: [scripts/**]
    static_interfaces: [CLI commands, audit artifacts]
    dynamic_behavior: 校验连接、检查归档、生成样例和执行 ASPICE 一致性检查。
    requirements: [SWR-NFR-003, SWR-NFR-004]
component_interfaces:
  - {component_id: ARC-APP, name: run_app.py CLI, kind: command, purpose: 启动受控 Streamlit 进程并清理本项目遗留进程, parameters: "--port: 可选监听端口，默认 8501；环境变量: 从 .env 与宿主环境读取", returns: 进程退出码与启动日志, failures: Python 或 Streamlit 不可用时终止并输出明确错误}
  - {component_id: ARC-APP, name: Streamlit session, kind: state, purpose: 在页面重运行之间保存报告、配置和生成状态, parameters: "session_state key: 状态键；value: 对应页面状态或报告对象", returns: 当前会话内可复用的状态值, failures: 缺失键使用受控默认值，不跨用户会话共享}
  - {component_id: ARC-APP, name: RunConfig, kind: data, purpose: 向流水线提供冻结且可审计的运行模式和供应商配置, parameters: "mode: rule/llm/hybrid/replay；provider/model: LLM 路由；功能开关与超时: 环境配置", returns: 不可变运行配置对象, failures: 非法配置在启动或配置解析阶段拒绝}
  - {component_id: ARC-CORE, name: run_trade_agent_pipeline, kind: function, purpose: 编排数据获取、分析、Agent、报告和归档的完整执行顺序, parameters: "config: RunConfig；progress: 可选 ProgressReporter；replay 输入: 可选归档上下文", returns: 结构化报告、行情数据和分析结果, failures: 阶段失败写入进度与失败归档，不静默伪造成功结果}
  - {component_id: ARC-CORE, name: ProgressReporter, kind: protocol, purpose: 发布阶段开始、进度、LLM I/O、成功和失败事件, parameters: "stage/event: 阶段或事件标识；message/payload: 可展示消息和审计载荷", returns: 无业务返回值，向观察者发布状态, failures: 观察器不得改变流水线业务判定}
  - {component_id: ARC-CORE, name: core dataclasses, kind: data, purpose: 在编排阶段间传递类型化状态和结果, parameters: "字段由对应 dataclass 定义；时间和来源字段必须保留", returns: 可序列化或可验证的阶段对象, failures: 必填字段缺失时由构造或门禁拒绝}
  - {component_id: ARC-DATA, name: DataFetchResult, kind: data, purpose: 汇总单一数据源的成功数据、来源元数据和失败原因, parameters: "data: 获取结果；source/as_of: 来源与截止时间；error: 可选失败信息", returns: 供 MarketContext 合并的标准结果, failures: 外部失败显式保存在 error/status 中}
  - {component_id: ARC-DATA, name: MarketContext, kind: data, purpose: 向分析层提供时间对齐后的行情、宏观、新闻和日历上下文, parameters: "timeframes: 各周期 OHLCV；external facts: 外部证据；as_of: 截止时间", returns: 冻结的市场上下文快照, failures: 缺失或过期来源必须带状态，不得冒充实时事实}
  - {component_id: ARC-DATA, name: DataSource, kind: protocol, purpose: 统一不同市场和外部数据供应商的获取边界, parameters: "symbol/timeframe: 标的与周期；start/end 或 as_of: 时间范围；timeout: 超时", returns: DataFetchResult 或标准化记录集合, failures: 网络、鉴权、限流和空数据转换为显式失败状态}
  - {component_id: ARC-DATA, name: archive payload, kind: data, purpose: 将获取数据及来源元数据交给归档组件持久化, parameters: "frames/facts: 数据内容；source metadata: 来源、时间与状态", returns: 可 JSON/表格序列化的归档载荷, failures: 不可序列化字段在保存前校验失败}
  - {component_id: ARC-INDICATORS, name: enriched OHLCV, kind: data, purpose: 在原始 OHLCV 上附加确定性技术指标列, parameters: "OHLCV DataFrame: UTC 时间索引与数值列；indicator config: 周期参数", returns: 保留原索引并新增指标列的数据表, failures: 列缺失、样本不足或非数值输入产生显式质量状态或异常}
  - {component_id: ARC-INDICATORS, name: indicator snapshot, kind: data, purpose: 为规则和报告提供指定截止时点的指标值, parameters: "enriched frame: 指标数据表；as_of: 截止时间", returns: 不包含未来数据的指标快照, failures: 截止点无有效样本时返回缺失状态}
  - {component_id: ARC-ANALYSIS, name: TimeframeAnalysis, kind: data, purpose: 表达单一周期的趋势、结构、指标和证据, parameters: "timeframe: 周期；facts/signals: 事实与信号；as_of/source: 时效和来源", returns: 可追溯的周期分析对象, failures: 冲突或证据不足通过状态和置信度表达}
  - {component_id: ARC-ANALYSIS, name: TradingSignal, kind: data, purpose: 表达经门禁后的方向、入场、止损、目标和授权状态, parameters: "direction/levels: 方向与价格；trigger/evidence IDs: 触发与证据；authorization: 授权状态", returns: 供 Agent、报告和回测消费的交易信号, failures: 几何或证据门禁失败时保持 wait/未授权}
  - {component_id: ARC-ANALYSIS, name: FactRegistry, kind: service, purpose: 注册事实、来源、时效和稳定 ID，防止叙事替代事实, parameters: "fact: 事实值；source/as_of: 来源与截止时间；eligibility: 使用资格", returns: 稳定 fact ID 与可查询事实记录, failures: 冲突、过期或不合格事实不得获得执行资格}
  - {component_id: ARC-ANALYSIS, name: invariant result, kind: data, purpose: 汇总报告结构与业务不变量检查结果, parameters: "report: 候选报告；policy: 当前门禁策略", returns: 通过状态、违规项和阻断理由, failures: 任一阻断违规使报告不可发布或不可执行}
  - {component_id: ARC-AGENTS, name: AnalystTeam, kind: service, purpose: 组织多个分析角色并合并结构化证据, parameters: "market context: 市场上下文；config: Agent/LLM 配置；progress: 可选进度接口", returns: AgentEvidence 集合与分析轨迹, failures: 单角色失败显式记录并按策略降级}
  - {component_id: ARC-AGENTS, name: AgentEvidence, kind: data, purpose: 保存 Agent 结论、证据引用、置信度和来源, parameters: "agent/stage: 角色阶段；claims/evidence IDs: 结论与证据；confidence: 置信度", returns: 可供后续角色验证的证据对象, failures: 无来源结论不得升级为合格事实}
  - {component_id: ARC-AGENTS, name: TransactionProposal, kind: data, purpose: 表达交易候选的方向、价格几何、触发和理由, parameters: "direction/entry/stop/targets: 交易参数；evidence IDs: 支撑证据", returns: 供 RiskReview 审核的候选方案, failures: 参数缺失或几何非法时拒绝进入风险审核}
  - {component_id: ARC-AGENTS, name: RiskReview, kind: data, purpose: 对候选方案执行风险预算、几何和授权复核, parameters: "proposal: TransactionProposal；risk config: 风险限制；market facts: 市场事实", returns: 批准、调整或拒绝结论及理由, failures: 任一硬门禁失败返回拒绝}
  - {component_id: ARC-AGENTS, name: ManagerDecision, kind: data, purpose: 汇总分析、交易和风险意见形成最终决策, parameters: "agent traces: 各角色轨迹；risk review: 风险结论；authorization facts: 授权事实", returns: 最终动作、规模、置信度和审计理由, failures: 证据不足或未触发时输出 wait 和零规模}
  - {component_id: ARC-LLM, name: LLMClient, kind: service, purpose: 按阶段策略调用模型并记录请求、响应、延迟和错误, parameters: "stage: 阶段；messages/context: 输入上下文；schema: 输出约束；timeout/retry: 传输策略", returns: 结构化模型结果与调用元数据, failures: 超时、传输或解析失败显式返回并触发既定降级}
  - {component_id: ARC-LLM, name: stage payload, kind: data, purpose: 为各 LLM 阶段提供最小化、可审计的上下文载荷, parameters: "facts/config/history: 允许进入该阶段的事实、配置和历史；policy version: 策略版本", returns: 可序列化且经过裁剪的阶段输入, failures: 未授权或过期事实在构造阶段排除}
  - {component_id: ARC-LLM, name: JSON schema parser, kind: service, purpose: 将模型文本解析并验证为阶段结构化对象, parameters: "raw response: 模型响应；schema/model: 目标结构；fallback policy: 回退策略", returns: 合法结构化对象或解析失败记录, failures: 非法 JSON、字段缺失或类型不符不得进入下游}
  - {component_id: ARC-RUN, name: RunContext, kind: data, purpose: 固定单次运行的 ID、时间、配置、模式和追踪信息, parameters: "run_id/time: 运行标识与时间；config/mode: 冻结配置；trace metadata: 追踪元数据", returns: 供所有阶段共享的运行上下文, failures: 运行标识或必需配置缺失时禁止启动}
  - {component_id: ARC-RUN, name: manifest, kind: data, purpose: 描述归档所含文件、schema、状态和校验信息, parameters: "artifact entries: 文件及角色；schema/status: 版本和流水线状态；checksums: 可选校验值", returns: 可验证的归档清单, failures: 清单与实际工件不一致时验证失败}
  - {component_id: ARC-RUN, name: archive schema/index, kind: service, purpose: 保存、列举、验证和加载不可变运行归档, parameters: "run_id/path: 归档定位；payload/manifest: 保存内容；compatibility mode: 兼容策略", returns: 归档引用、索引项或加载后的运行快照, failures: 缺失、损坏或不兼容归档返回明确诊断}
  - {component_id: ARC-BACKTEST, name: BacktestConfig, kind: data, purpose: 固定回测时间范围、成本、风险和信号策略, parameters: "start/end: 回测区间；capital/risk: 资金与风险；cost/slippage: 成本；strategy params: 策略参数", returns: 可复现的回测配置, failures: 非法区间或参数在执行前拒绝}
  - {component_id: ARC-BACKTEST, name: BacktestResult, kind: data, purpose: 汇总交易序列、权益曲线、指标和数据质量, parameters: "trades/equity: 仿真输出；metrics: 汇总指标；data metadata: 数据来源与范围", returns: 可报告和比较的回测结果, failures: 样本不足或执行失败携带状态和原因}
  - {component_id: ARC-BACKTEST, name: TradeResult, kind: data, purpose: 记录单笔仿真交易的进出场、盈亏、成本和退出原因, parameters: "entry/exit: 价格时间；size: 规模；costs: 成本；reason: 退出原因", returns: 单笔交易审计记录, failures: 未成交候选不伪造为已完成交易}
  - {component_id: ARC-VIZ, name: report dict, kind: data, purpose: 向页面组件提供门禁后的统一报告快照, parameters: "report sections: 报告各节；audit metadata: 事实、决策和可靠度元数据", returns: 只读展示数据, failures: 缺失字段显示受控空态或诊断，不改变报告事实}
  - {component_id: ARC-VIZ, name: chart HTML, kind: presentation, purpose: 将行情、指标、结构区域和计划投影序列化为交互图表, parameters: "OHLCV/overlays: 图表数据与覆盖层；theme/size: 展示参数", returns: 可嵌入 Streamlit 的 HTML/JavaScript, failures: 空数据返回明确空态，不执行交易逻辑}
  - {component_id: ARC-VIZ, name: Streamlit widgets/session, kind: presentation, purpose: 接收用户配置并展示生成、回放和审计状态, parameters: "widget values: 用户输入；session state: 当前会话状态；report: 展示报告", returns: 页面渲染和会话状态更新, failures: UI 错误不得修改业务报告或授权判定}
  - {component_id: ARC-TOOLS, name: CLI commands, kind: command, purpose: 提供连接检查、归档检查、样例导出和文档生成入口, parameters: "命令行参数: 各工具定义的路径、ID、模式和输出选项", returns: 退出码、控制台诊断及约定输出文件, failures: 参数或环境错误返回非零退出码}
  - {component_id: ARC-TOOLS, name: audit artifacts, kind: document, purpose: 输出 ASPICE 登记、追溯、配置基线和验证证据, parameters: "源码/测试/配置元数据: 只读输入；--write/--check: 生成或校验模式", returns: docs/aspice 下的受控文档与校验结果, failures: 资产过期或不一致时校验失败且不修改业务代码}
interfaces:
  - id: IF-DATA-CONTEXT
    providers: [ARC-DATA, ARC-INDICATORS]
    consumers: [ARC-ANALYSIS, ARC-AGENTS]
    purpose: 将标准化行情和指标快照交给分析与 Agent，保持来源和时间语义。
    parameters: "market_context: MarketContext；enriched_frames: 各周期指标数据；as_of: 截止时间"
    returns: 可按 fact ID 和时间框架读取的冻结分析输入。
    failures: 缺失、过期或时间未对齐的数据携带质量状态并触发降级。
    contract: MarketContext + enriched timeframe DataFrames；时间索引必须带 UTC 语义。
  - id: IF-ANALYSIS-AGENTS
    providers: [ARC-ANALYSIS]
    consumers: [ARC-AGENTS, ARC-LLM]
    purpose: 将确定性事实、候选计划和证据资格传递给 Agent 与 LLM 阶段。
    parameters: "facts: FactRegistry 快照；proposals: 候选计划；eligibility: 事实资格；policy_version: 策略版本"
    returns: 带稳定 ID 的结构化分析载荷。
    failures: 无来源或不合格自由文本不得进入执行或报告事实链。
    contract: 结构化事实、稳定 evidence/fact IDs 和候选计划；自由文本不得替代核心关系。
  - id: IF-AGENTS-REPORT
    providers: [ARC-AGENTS]
    consumers: [ARC-ANALYSIS, ARC-CORE]
    purpose: 将各 Agent 轨迹、风险审核和最终管理决策送入报告与主编排。
    parameters: "agent_trace: 角色轨迹；risk_review: 风险结论；manager_decision: 最终决策"
    returns: 可审计的授权动作、理由和关联 signal/fact IDs。
    failures: 阶段失败或证据不足时输出 wait/拒绝状态而非交易授权。
    contract: AgentTrace、ManagerDecision 和授权 signal IDs。
  - id: IF-REPORT-ARCHIVE
    providers: [ARC-ANALYSIS, ARC-CORE]
    consumers: [ARC-RUN, ARC-VIZ]
    purpose: 将通过不变量门禁的同一报告快照提供给归档和界面。
    parameters: "report: 版本化报告；invariant_result: 门禁结果；run_context: 运行元数据"
    returns: 可保存、回放和展示的一致报告载荷。
    failures: 门禁失败的报告不得标记为成功发布；保存失败生成失败归档。
    contract: 版本化 report schema；归档和 UI 消费同一门禁后快照。
